syntax = "proto3";
package storage;
option go_package = "github.com/go-park-mail-ru/2026_1_KISS/pkg/api/storage";

service StorageService {
  rpc UploadFile(stream UploadFileChunk) returns (FileResponse);
  rpc DownloadFile(DownloadFileRequest) returns (stream DownloadFileChunk);
  rpc GetFile(GetFileRequest) returns (FileResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);

  rpc GetStorageStats(GetStorageStatsRequest) returns (GetStorageStatsResponse);
  rpc AdminListFiles(AdminListFilesRequest) returns (ListFilesResponse);
  rpc DeleteFileByURL(DeleteFileByURLRequest) returns (DeleteFileResponse);

  rpc GetUserStorageStats(GetUserStorageStatsRequest) returns (GetStorageStatsResponse);

  rpc ShareFile(ShareFileRequest) returns (ShareFileResponse);
  rpc RevokeShare(RevokeShareRequest) returns (RevokeShareResponse);
  rpc ListShares(ListSharesRequest) returns (ListSharesResponse);
  rpc ListSharedWithMe(ListSharedWithMeRequest) returns (ListFilesResponse);
  rpc SetFilePublic(SetFilePublicRequest) returns (FileResponse);
  rpc GetSharedFileByToken(GetSharedFileByTokenRequest) returns (FileResponse);
  rpc IncrementDownloadCount(IncrementDownloadCountRequest) returns (IncrementDownloadCountResponse);
  rpc RenameFile(RenameFileRequest) returns (FileResponse);
  rpc GetDownloadable(GetDownloadableRequest) returns (GetDownloadableResponse);
}

message DeleteFileByURLRequest {
  string url = 1;
}

message UploadFileChunk {
  int64 owner_id = 1;
  bytes data = 2;
  string filename = 3;
  int64 file_size = 4;
  string category = 5;
  optional int64 notebook_id = 6;
}

message FileInfo {
  string id = 1;
  int64 owner_id = 2;
  optional int64 notebook_id = 3;
  string category = 4;
  string filename = 5;
  string url = 6;
  string mime_type = 7;
  int64 size = 8;
  int64 created_at = 9;
  bool is_public = 10;
  string share_token = 11;
  int64 share_expires_at = 12;
  int64 downloads_count = 13;
  string your_permission = 14;
  string storage_key = 15;
  string owner_email = 16;
}

message FileResponse {
  FileInfo file = 1;
}

message DownloadFileRequest {
  string file_id = 1;
  int64  user_id  = 2;
}

message DownloadFileChunk {
  bytes data       = 1;
  int64 total_size = 2;
}

message GetFileRequest {
  string file_id = 1;
  int64 user_id = 2;
}

message ListFilesRequest {
  int64            user_id     = 1;
  string           category    = 2;
  int32            limit       = 3;
  int32            offset      = 4;
  optional int64   notebook_id = 5;
}

message ListFilesResponse {
  repeated FileInfo files = 1;
  int32 total = 2;
}

message DeleteFileRequest {
  string file_id = 1;
  int64 user_id = 2;
}

message DeleteFileResponse {}

message GetStorageStatsRequest {}

message GetStorageStatsResponse {
  int64 total_files = 1;
  int64 total_size_bytes = 2;
  map<string, int64> files_by_category = 3;
  map<string, int64> size_by_category = 4;
}

message AdminListFilesRequest {
  string category = 1;
  int64 owner_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message GetUserStorageStatsRequest {
  int64 user_id = 1;
}

message FileShareInfo {
  string file_id = 1;
  int64 user_id = 2;
  string email = 3;
  string permission_level = 4;
  int64 created_at = 5;
}

message ShareFileRequest {
  int64 requester_id = 1;
  string file_id = 2;
  int64 target_user_id = 3;
  string permission_level = 4;
}

message ShareFileResponse {
  FileShareInfo share = 1;
}

message RevokeShareRequest {
  int64 requester_id = 1;
  string file_id = 2;
  int64 target_user_id = 3;
}

message RevokeShareResponse {}

message ListSharesRequest {
  int64 requester_id = 1;
  string file_id = 2;
}

message ListSharesResponse {
  repeated FileShareInfo shares = 1;
}

message ListSharedWithMeRequest {
  int64 user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message SetFilePublicRequest {
  int64 requester_id = 1;
  string file_id = 2;
  bool is_public = 3;
  int64 expires_at = 4;
}

message GetSharedFileByTokenRequest {
  string token = 1;
}

message IncrementDownloadCountRequest {
  string file_id = 1;
}

message IncrementDownloadCountResponse {}

message RenameFileRequest {
  int64 requester_id = 1;
  string file_id = 2;
  string filename = 3;
}

message GetDownloadableRequest {
  string file_id = 1;
  int64 user_id = 2;
}

message GetDownloadableResponse {
  FileInfo file = 1;
  bool allowed = 2;
}
