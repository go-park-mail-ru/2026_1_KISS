services:
  gateway:
    build:
      context: .
      dockerfile: deploy/gateway/Dockerfile
    env_file: .env
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      auth:
        condition: service_healthy
      notebook:
        condition: service_healthy
      runner:
        condition: service_healthy
      storage:
        condition: service_healthy
    environment:
      SERVER_PORT: "${SERVER_PORT:-8080}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000}"
      AUTH_GRPC_ADDR: "auth:9001"
      NOTEBOOK_GRPC_ADDR: "notebook:9002"
      RUNNER_GRPC_ADDR: "runner:9003"
      STORAGE_GRPC_ADDR: "storage:9004"
      AUTH_SESSION_TTL: "${AUTH_SESSION_TTL:-24h}"
      UPLOAD_DIR: /app/uploads
      RATE_LIMIT_MAX_REQUESTS: "${RATE_LIMIT_MAX_REQUESTS:-300}"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network

  auth:
    build:
      context: .
      dockerfile: deploy/auth/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9001 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-colab}?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GRPC_PORT: "9001"
      METRICS_PORT: "9090"
      AUTH_SESSION_TTL: "${AUTH_SESSION_TTL:-24h}"
      STORAGE_GRPC_ADDR: "storage:9004"
    networks:
      - app-network

  notebook:
    build:
      context: .
      dockerfile: deploy/notebook/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9002 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-colab}?sslmode=disable
      GRPC_PORT: "9002"
      METRICS_PORT: "9090"
    networks:
      - app-network

  runner:
    build:
      context: .
      dockerfile: deploy/runner/Dockerfile
    env_file: .env
    depends_on:
      notebook:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9003 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      GRPC_PORT: "9003"
      METRICS_PORT: "9090"
      NOTEBOOK_GRPC_ADDR: "notebook:9002"
      RUNNER_IMAGE_PYTHON: kiss-python-runner
      NETWORK_NAME: "kiss_app-network"
      RUNNER_STARTUP_TIMEOUT: "${RUNNER_STARTUP_TIMEOUT:-30s}"
      RUNNER_HEALTHCHECK_INTERVAL: "${RUNNER_HEALTHCHECK_INTERVAL:-300ms}"
      RUNNER_IDLE_TIMEOUT: "${RUNNER_IDLE_TIMEOUT:-15m}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

  storage:
    build:
      context: .
      dockerfile: deploy/storage/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9004 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-colab}?sslmode=disable
      GRPC_PORT: "9004"
      METRICS_PORT: "9090"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network

  migrator:
    build: .
    command: ["/app/migrator"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-colab}?sslmode=disable
    restart: "no"
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-colab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-colab}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "no", "--save", "300 10", "--save", "60 1000"]
    volumes:
      - redis_data:/data
    networks:
      - app-network
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - app-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: https://colkiss.ru/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-colab}
    depends_on:
      - prometheus
      - postgres
    networks:
      - app-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    name: kiss_app-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:
