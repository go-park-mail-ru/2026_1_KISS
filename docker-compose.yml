services:
  gateway:
    build:
      context: .
      dockerfile: deploy/gateway/Dockerfile
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      auth:
        condition: service_healthy
      notebook:
        condition: service_healthy
      runner:
        condition: service_healthy
    environment:
      SERVER_PORT: "${SERVER_PORT:-8080}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000}"
      AUTH_GRPC_ADDR: "auth:9001"
      NOTEBOOK_GRPC_ADDR: "notebook:9002"
      RUNNER_GRPC_ADDR: "runner:9003"
      AUTH_SESSION_TTL: "${AUTH_SESSION_TTL:-24h}"
      UPLOAD_DIR: /app/uploads
      RATE_LIMIT_MAX_REQUESTS: "${RATE_LIMIT_MAX_REQUESTS:-300}"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network

  auth:
    build:
      context: .
      dockerfile: deploy/auth/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9001 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-colab}?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GRPC_PORT: "9001"
      AUTH_SESSION_TTL: "${AUTH_SESSION_TTL:-24h}"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network

  notebook:
    build:
      context: .
      dockerfile: deploy/notebook/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9002 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-colab}?sslmode=disable
      GRPC_PORT: "9002"
    networks:
      - app-network

  runner:
    build:
      context: .
      dockerfile: deploy/runner/Dockerfile
    depends_on:
      notebook:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9003 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      GRPC_PORT: "9003"
      NOTEBOOK_GRPC_ADDR: "notebook:9002"
      RUNNER_IMAGE_PYTHON: kiss-python-runner
      NETWORK_NAME: "2026_1_kiss_app-network"
      RUNNER_STARTUP_TIMEOUT: "${RUNNER_STARTUP_TIMEOUT:-30s}"
      RUNNER_HEALTHCHECK_INTERVAL: "${RUNNER_HEALTHCHECK_INTERVAL:-300ms}"
      RUNNER_IDLE_TIMEOUT: "${RUNNER_IDLE_TIMEOUT:-15m}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

  migrator:
    build: .
    command: ["/app/migrator"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-colab}?sslmode=disable
    restart: "no"
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-colab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-colab}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "no", "--save", "300 10", "--save", "60 1000"]
    volumes:
      - redis_data:/data
    networks:
      - app-network
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
