name: CI

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: |
          PKGS=$(go list ./... | grep -vE '(cmd/|internal/mocks|internal/app$)')
          go test -race -coverprofile=coverage.out $PKGS

      - name: Check coverage
        run: |
          go tool cover -func=coverage.out
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk "BEGIN { if (${TOTAL}+0 < 70.0) { print \"FAIL: coverage ${TOTAL}% is below 70% threshold\"; exit 1 } }"
