name: Deploy

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          timeout: 10m
          script: |
            cd /home/ubuntu/2026_1_KISS

            git fetch origin develop
            CHANGED=$(git diff --name-only HEAD origin/develop)

            if [ -z "$CHANGED" ]; then
              echo "No changes detected, skipping deploy"
              exit 0
            fi

            git pull origin develop

            if echo "$CHANGED" | grep -q '^build/'; then
              echo "Python runner image changed, rebuilding..."
              cd build
              docker build -t kiss-python-runner -f py-runner/Dockerfile .
              cd ..
            fi

            if echo "$CHANGED" | grep -qE '(docker-compose\.yml|Dockerfile)'; then
              echo "Infrastructure changed, full rebuild..."
              docker compose down
              docker compose up -d --build
            elif echo "$CHANGED" | grep -qE '\.(go|mod|sum|sql)$'; then
              echo "Source or migrations changed, rebuilding app..."
              docker compose up -d --build
            else
              echo "No application changes, skipping rebuild"
            fi
