name: Deploy

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Generate protobuf
        run: make proto

      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Generate protobuf
        run: make proto

      - name: Run tests
        run: |
          PKGS=$(go list ./... | grep -vE '(cmd/|internal/mocks|pkg/api/|/app$|/grpc$|internal/runner/container)')
          go test -race -coverprofile=coverage.out $PKGS

      - name: Check coverage
        run: |
          go tool cover -func=coverage.out
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk "BEGIN { if (${TOTAL}+0 < 70.0) { print \"FAIL: coverage ${TOTAL}% is below 70% threshold\"; exit 1 } }"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e
            cd /home/ubuntu/2026_1_KISS

            git fetch origin develop
            CHANGED=$(git diff --name-only HEAD origin/develop)

            if [ -z "$CHANGED" ]; then
              echo "No changes detected, skipping deploy"
              exit 0
            fi

            git reset --hard origin/develop

            docker builder prune -f --filter "until=168h"
            docker image prune -af --filter "until=168h"

            if echo "$CHANGED" | grep -q '^build/'; then
              echo "Python runner image changed, rebuilding..."
              cd build
              docker build -t kiss-python-runner -f py-runner/Dockerfile .
              cd ..
            fi

            if echo "$CHANGED" | grep -qE '(docker-compose\.yml|Dockerfile)'; then
              echo "Infrastructure changed, full rebuild..."
              docker compose down
              docker compose up -d --build
            elif echo "$CHANGED" | grep -qE '\.(go|mod|sum|sql)$'; then
              echo "Source or migrations changed, rebuilding app..."
              docker compose up -d --build
            else
              echo "No application changes, skipping rebuild"
            fi
