global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: auth
    static_configs:
      - targets: ["auth:9090"]

  - job_name: notebook
    static_configs:
      - targets: ["notebook:9090"]

  - job_name: runner
    static_configs:
      - targets: ["runner:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
